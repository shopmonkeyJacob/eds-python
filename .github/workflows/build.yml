name: Build & Release

on:
  push:
    branches: ["**"]
    tags: ["v*"]
  pull_request:
    branches: [main]

concurrency:
  group: ${{ github.workflow }}-${{ github.ref }}
  cancel-in-progress: true

env:
  PYTHON_VERSION: "3.11"
  FORCE_JAVASCRIPT_ACTIONS_TO_NODE24: "true"

jobs:
  # ── Build & test ─────────────────────────────────────────────────────────────
  build:
    name: Build & Test
    runs-on: ubuntu-latest

    steps:
      - uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: ${{ env.PYTHON_VERSION }}

      - name: Install dependencies
        run: pip install ".[dev]"

      - name: Lint
        run: ruff check eds/

      - name: Type-check
        run: mypy eds/

      - name: Test
        run: pytest --tb=short -m "not integration and not e2e"

  # ── Publish cross-platform binaries (version tags only) ──────────────────────
  # PyInstaller cannot cross-compile — each platform must build its own binary.
  publish:
    name: Publish (${{ matrix.rid }})
    if: startsWith(github.ref, 'refs/tags/v')
    needs: build

    strategy:
      matrix:
        include:
          - rid: osx-arm64
            runner: macos-14        # Apple Silicon
            archive: eds-osx-arm64.tar.gz
            binary: eds
          - rid: linux-x64
            runner: ubuntu-latest
            archive: eds-linux-x64.tar.gz
            binary: eds
          - rid: win-x64
            runner: windows-latest
            archive: eds-win-x64.zip
            binary: eds.exe

    runs-on: ${{ matrix.runner }}

    steps:
      - uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: ${{ env.PYTHON_VERSION }}

      - name: Install unixODBC (macOS)
        if: runner.os == 'macOS'
        run: brew install unixodbc

      - name: Install unixODBC (Linux)
        if: runner.os == 'Linux'
        run: sudo apt-get install -y unixodbc-dev

      - name: Install package and PyInstaller
        run: pip install . pyinstaller

      - name: Bake version into binary
        shell: bash
        run: |
          # Strip the leading 'v' from the tag (e.g. v1.0.0-rc → 1.0.0-rc) and
          # write it as a plain constant so PyInstaller embeds the exact version
          # string rather than reading a runtime env var that won't be set.
          VERSION="${GITHUB_REF_NAME#v}"
          printf 'CURRENT: str = "%s"\n' "$VERSION" > eds/version.py

      - name: Build binary
        shell: bash
        run: |
          pyinstaller \
            --onefile \
            --name eds \
            --hidden-import eds.drivers.postgres \
            --hidden-import eds.drivers.mysql \
            --hidden-import eds.drivers.sqlserver \
            --hidden-import eds.drivers.snowflake_ \
            --hidden-import eds.drivers.s3 \
            --hidden-import eds.drivers.azure_blob \
            --hidden-import eds.drivers.kafka_ \
            --hidden-import eds.drivers.eventhub \
            --hidden-import eds.drivers.file_ \
            --hidden-import asyncpg \
            --hidden-import aiomysql \
            --hidden-import pyodbc \
            --hidden-import snowflake.connector \
            --hidden-import boto3 \
            --hidden-import azure.storage.blob \
            --hidden-import confluent_kafka \
            --hidden-import azure.eventhub \
            --hidden-import pgpy \
            --hidden-import prometheus_client \
            eds/__main__.py

      - name: Package binary (Unix)
        if: matrix.rid != 'win-x64'
        run: tar czf ${{ matrix.archive }} -C dist eds

      - name: Package binary (Windows)
        if: matrix.rid == 'win-x64'
        shell: pwsh
        run: Compress-Archive -Path dist\eds.exe -DestinationPath ${{ matrix.archive }}

      - name: Upload artifact
        uses: actions/upload-artifact@v4
        with:
          name: ${{ matrix.archive }}
          path: ${{ matrix.archive }}
          if-no-files-found: error

  # ── GitHub Release (version tags only) ───────────────────────────────────────
  release:
    name: Create GitHub Release
    if: startsWith(github.ref, 'refs/tags/v')
    needs: publish
    runs-on: ubuntu-latest
    permissions:
      contents: write

    steps:
      - uses: actions/checkout@v4
        with:
          fetch-depth: 0   # full history so git log can reach the previous tag

      - name: Download all artifacts
        uses: actions/download-artifact@v4
        with:
          path: artifacts
          merge-multiple: true

      - name: Build release notes
        id: notes
        run: |
          PREV=$(git tag --sort=-version:refname | grep -E '^v[0-9]' | sed -n '2p')
          if [ -n "$PREV" ]; then
            RANGE="${PREV}..HEAD"
            HEADER="Changes since ${PREV}"
          else
            RANGE="HEAD"
            HEADER="Initial release"
          fi
          NOTES=$(git log "$RANGE" --pretty=format:"- %s (%h)" --no-merges)
          {
            echo "body<<EOF"
            echo "## ${HEADER}"
            echo ""
            echo "${NOTES}"
            echo "EOF"
          } >> "$GITHUB_OUTPUT"

      - name: Create Release
        uses: softprops/action-gh-release@v2
        with:
          name: ${{ github.ref_name }}
          body: ${{ steps.notes.outputs.body }}
          prerelease: ${{ contains(github.ref_name, 'alpha') || contains(github.ref_name, 'beta') || contains(github.ref_name, 'rc') }}
          files: artifacts/*
